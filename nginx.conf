worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Basic caching optimizations
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # Temporary paths mapped to /tmp to prevent permission errors on Alpine
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp_path;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        # Intercept native Docker Compose routing originally targeting the Go server
        listen 8080 default_server;
        server_name _;

        # 🚀 Highly Efficient Static Media Caching 
        location /uploads/ {
            # Maps natively to /app/uploads/...
            root /app;
            
            # Browser-level persistent caching
            expires max;
            add_header Cache-Control "public, no-transform, immutable";
            
            # Suppress logs for static assets to reduce disk I/O
            access_log off;
        }

        # 🔁 Proxy all other JSON API/REST requests natively back into Go
        location / {
            proxy_pass http://127.0.0.1:8081;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for realtime apps
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
